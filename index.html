<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#428BCA">
    <meta name="description" content="HTML5 Radio Player">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        body {
            text-align: center;
            max-width: 920px;
            margin: auto;
            border: 4px solid #428BCA;
        }
        .add {
            padding: 12px;
            background-color: #AAF;
            font-size: 20px;
            cursor: pointer;
        }
        .add:hover { background-color: #FAA; }
        div {
            padding: 10px;
            margin: 4px;
            background-color: #AAF;
            cursor: pointer;
        }
        div:hover { background-color: white; }
        .del {
            float: right;
            color: red;
            background: orange;
            padding: 0 8px;
        }
        #logs {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 18%;
            height: 100%;
            background: black;
            color: white;
            overflow-y: auto;
            text-align: left;
            padding: 5px;
            opacity: 0.85;
            z-index: 9998;
        }
        #status {
            position: fixed;
            top: 10px;
            right: 10px;
            background: black;
            color: orange;
            padding: 10px;
            z-index: 9999;
        }
        #installButton {
            padding: 12px 24px;
            font-size: 16px;
            margin: 15px;
            cursor: pointer;
        }
        @media all and (display-mode: standalone) {
            #installButton { display: none !important; }
        }
    </style>
    <title>html5 radio player 0.1.15</title>
</head>
<body>
    <div id="status"></div>
    <div id="logs"></div>

    <script>
        // Safe variables
        let oldkey = false;
        let deferredPrompt = null;
        let myAudio, logger, st2;

        window.onbeforeunload = () => "Don't unload!";

        const downloadToFile = (content, filename, contentType) => {
            const a = document.createElement('a');
            const file = new Blob([content], { type: contentType });
            a.href = URL.createObjectURL(file);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
        };

        function logs(m) {
            if (!logger) return;
            logger.innerHTML += '<br>' + m;
            logger.scrollTop = logger.scrollHeight;
        }

        function render() {
            let cnr = 0;
            let txt = '<br><br>';
            for (let key in localStorage) {
                if (key[0] === "|") {
                    cnr++;
                    let stationKey = key.substring(1);
                    txt += `<span class="del" onclick="del('${stationKey}')">X</span> 
                            <div id="${stationKey}" onclick="play('${stationKey}', ${cnr})">${cnr}. ${atob(stationKey)}</div>`;
                }
            }
            document.getElementById("sts").innerHTML = txt;
        }

        function add() {
            let sn = prompt("Station name:", "");
            let su = prompt("Stream URL:", "https://");
            if (sn && su) {
                localStorage.setItem('|' + btoa(sn), btoa(su));
                render();
                logs('Added: ' + sn);
            }
        }

        function del(id) {
            let name = atob(id);
            if (confirm("Delete " + name + "?")) {
                localStorage.removeItem("|" + id);
                render();
                logs('Deleted: ' + name);
            }
        }

        function play(key, num) {
            if (oldkey === key) return;
            
            if (oldkey) {
                let oldEl = document.getElementById(oldkey);
                if (oldEl) oldEl.style.background = '';
            }

            let keyid = document.getElementById(key);
            let streamUrl = atob(localStorage.getItem('|' + key));

            keyid.style.background = 'lime';
            logs('Playing: ' + atob(key));

            myAudio.src = streamUrl;
            myAudio.play();

            st2.innerHTML = `<p>NAME: ${atob(key)}<p>URL: ${streamUrl}`;
            oldkey = key;
        }

        // PWA Install
        window.installPWA = function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
            }
        };

        window.onload = function() {
            logger = document.getElementById('logs');
            st2 = document.getElementById('status');
            myAudio = document.getElementById("player");

            document.getElementById("sts").innerHTML = '<br><br>Loading...';
            
            logs('App started');

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }

            render();
        };

        window.addEventListener('beforeinstallprompt', (e) => {
            deferredPrompt = e;
            logs('Install button ready');
        });
    </script>

    <a href="stations.json">stations.json (example)</a><br><br>
    <span class="add" onclick="add()">Add station</span>
    <div id="sts"></div>
    <br>
    <button id="installButton" onclick="installPWA()">Install as App (PWA)</button>

    <audio id="player"></audio>
</body>
</html>
