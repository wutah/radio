<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#428BCA">
    <meta name="description" content="HTML5 Radio Player - Add and listen to your favorite radio stations">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        html {
            line-break: anywhere;
            word-wrap: break-word;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        .add {
            padding: 8px;
            background-color: #AAF;
            color: #000;
            font-size: 19pt;
        }

        .add:hover {
            background-color: #FAA;
            cursor: pointer;
        }

        body {
            text-align: center;
            max-width: 920px;
            margin: auto;
            border-color: #428BCA;
            border-style: solid;
        }

        b {
            cursor: pointer;
            color: blue;
            text-decoration: underline;
        }

        b:hover {
            background-color: lightblue;
        }

        #sts {
            background-color: yellow;
        }

        div {
            padding: 8px;
            cursor: pointer;
            background-color: #AAF;
            margin-bottom: 2px;
        }

        div:hover {
            background-color: white;
        }

        .del {
            display: inline;
            float: right;
            color: red;
            background-color: orange;
        }

        .hid, #player {
            display: none;
        }

        #logs {
            cursor: default;
            text-align: left;
            opacity: 0.7;
            position: fixed;
            bottom: 0px;
            left: 0px;
            background-color: black;
            color: white;
            width: 15%;
            overflow-y: scroll;
            height: 100%;
            display: flex;
            flex-direction: column-reverse;
            z-index: 9998;
        }

        #status {
            position: fixed;
            top: 10px;
            right: 10px;
            color: orange;
            background-color: black;
            width: 25%;
            z-index: 9999;
        }

        /* Hide install button when app is installed */
        @media all and (display-mode: standalone) {
            #installButton {
                display: none !important;
            }
        }
    </style>
    <title>html5 radio player 0.1.10</title>
</head>
<body>
    <div id="status"></div>
    <div id="logs"></div>

    <script>
        window.onbeforeunload = function() {
            return "Don't unload!";
        };

        var oldkey = false;
        var deferredPrompt;

        const downloadToFile = (content, filename, contentType) => {
            const a = document.createElement('a');
            const file = new Blob([content], { type: contentType });
            a.href = URL.createObjectURL(file);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
        };

        function render() {
            var cnr = 0;
            var txt = '<br><br>';
            for (var key in localStorage) {
                if (key.substring(0, 1) == "|") {
                    cnr++;
                    var stationKey = key.substring(1);
                    txt += '<span title="delete" class="del" onclick="del(\'' + stationKey + '\');">X</span> ' +
                           '<div id="' + stationKey + '" onclick="play(\'' + stationKey + '\',\'' + cnr + '\');">' + 
                           cnr + '. ' + atob(stationKey) + '</div>';
                }
            }
            document.getElementById("sts").innerHTML = txt;
        }

        function add() {
            var sn = prompt("Please enter your station's name:", "");
            var su = prompt("Please enter your stream url:", "https://");
            if (sn && su) {
                localStorage.setItem('|' + btoa(sn), btoa(su));
                render();
                logs('Station "' + sn + '" added');
            } else {
                logs('Station addition canceled');
            }
        }

        function del(id) {
            var name = atob(id);
            if (confirm("Delete " + name + "?")) {
                localStorage.removeItem("|" + id);
                render();
                logs('Station "' + name + '" deleted');
            }
        }

        function getjson() {
            if (localStorage.length > 0) {
                var txt = '{ ';
                for (var key in localStorage) {
                    if (key.substring(0, 1) == "|") {
                        var k = key.substring(1);
                        txt += '"' + atob(k).replace(/"/g, '\\"') + '":"' + atob(localStorage.getItem(key)).replace(/"/g, '\\"') + '", ';
                    }
                }
                txt = txt.substring(0, txt.length - 2) + ' }';
                downloadToFile(txt, 'stations.json', 'application/json');
                logs('stations.json downloaded');
            } else {
                logs('No stations to export');
            }
        }

        function putjson(e, o) {
            var fr = new FileReader();
            fr.readAsText(o.files[0]);
            fr.onload = function(ev) {
                try {
                    var m = JSON.parse(ev.target.result);
                    if (confirm("YOUR STATIONS WILL BE REPLACED! Continue?")) {
                        localStorage.clear();
                        for (var k in m) {
                            localStorage.setItem('|' + btoa(k), btoa(m[k]));
                        }
                        render();
                        logs('Stations imported from JSON');
                    }
                } catch(err) {
                    logs('Invalid JSON file');
                }
            };
        }

        var timerId, url, watch1, watch2, op = false, logger, clog = 0, st2, myAudio;

        function logs(m) {
            if (!logger) return;
            if (clog > 1024) {
                clog = 0;
                logger.innerHTML = '';
            }
            clog++;
            logger.innerHTML += clog + '. ' + m + '<br>';
        }

        window.onload = function() {
            logger = document.getElementById('logs');
            st2 = document.getElementById('status');
            myAudio = document.getElementById("player");

            logs('Page loaded');
            render();

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => logs('Service Worker registered'))
                    .catch(err => logs('Service Worker error: ' + err));
            }

            hideInstallButtonIfStandalone();
        };

        function play(key, num) {
            if (oldkey == key) return;

            if (oldkey) {
                var oldEl = document.getElementById(oldkey);
                if (oldEl) {
                    oldEl.style.background = '';
                    oldEl.innerHTML = oldEl.innerHTML.replace(/ [🔊⌛⛔]/, '');
                }
            }

            var keyid = document.getElementById(key);
            url = atob(localStorage.getItem('|' + key));

            keyid.innerHTML = num + '. ' + atob(key) + ' ⌛ ';
            logs('Loading: ' + atob(key));

            myAudio.src = url;
            myAudio.play().catch(e => logs('Play error'));

            myAudio.oncanplay = function() {
                keyid.innerHTML = num + '. ' + atob(key) + ' 🔊 ';
                keyid.style.background = 'lime';
            };

            myAudio.onerror = function() {
                keyid.innerHTML = num + '. ' + atob(key) + ' ⛔ ';
                keyid.style.background = 'darkred';
                logs('Stream error');
            };

            oldkey = key;
            st2.innerHTML = '<p>NAME: ' + atob(key) + '<p>URL: ' + url;
        }

        // PWA Install
        window.addEventListener('beforeinstallprompt', (e) => {
            deferredPrompt = e;
            logs('PWA install prompt ready');
        });

        window.installPWA = function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choice) => {
                    logs(choice.outcome === 'accepted' ? 'App installed!' : 'Install canceled');
                    deferredPrompt = null;
                });
            }
        };

        function hideInstallButtonIfStandalone() {
            if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
                var btn = document.getElementById('installButton');
                if (btn) btn.style.display = 'none';
            }
        }

        window.addEventListener('load', hideInstallButtonIfStandalone);
    </script>

    <a href="stations.json">stations.json (example)</a><br><br><br>
    <span class="add" onclick="add();">Add station</span>
    <div id="sts"></div>
    
    <b onclick="getjson();">download stations.json</b>
    | <input onchange="putjson(event,this)" class="hid" type="file" id="file">
    <label for="file"><b>upload stations.json</b></label>
    <br><br>

    <button id="installButton" onclick="installPWA()" 
            style="padding:10px 20px; font-size:16px; margin:15px; cursor:pointer;">
        Install as App (PWA)
    </button>

    <audio id="player"></audio>
</body>
</html>
