<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#428BCA">
    <meta name="description" content="HTML5 Radio Player - Add and listen to your favorite radio stations">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        html {
            line-break: anywhere;
            word-wrap: break-word;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        .add {
            padding: 8px;
            background-color: #AAF;
            color: #000;
            font-size: 19pt;
        }

        .add:hover {
            background-color: #FAA;
            cursor: pointer;
        }

        body {
            text-align: center;
            max-width: 920px;
            margin: auto;
            border-color: #428BCA;
            border-style: solid;
        }

        b {
            cursor: pointer;
            color: blue;
            text-decoration: underline;
        }

        b:hover {
            background-color: lightblue;
        }

        #sts {
            background-color: yellow;
        }

        div {
            padding: 8px;
            cursor: pointer;
            background-color: #AAF;
            margin-bottom: 2px;
        }

        div:hover {
            background-color: white;
        }

        .del {
            display: inline;
            float: right;
            color: red;
            background-color: orange;
        }

        .hid, #player {
            display: none;
        }

        #logs {
            cursor: default;
            text-align: left;
            opacity: 0.7;
            position: fixed;
            bottom: 0px;
            left: 0px;
            background-color: black;
            color: white;
            width: 15%;
            overflow-y: scroll;
            height: 100%;
            display: flex;
            flex-direction: column-reverse;
            z-index: 9998;
        }

        #status {
            position: fixed;
            top: 10px;
            right: 10px;
            color: orange;
            background-color: black;
            width: 25%;
            z-index: 9999;
        }

        /* Start with button visible, hide only in PWA mode */
        #installButton {
            display: inline-block;
        }
    </style>
    <title>html5 radio player 0.1.13</title>
</head>
<body>
    <div id="status"></div>
    <div id="logs"></div>

    <script>
        window.onbeforeunload = function() {
            return "Don't unload!";
        };

        var oldkey = false;
        var deferredPrompt;

        const downloadToFile = (content, filename, contentType) => {
            const a = document.createElement('a');
            const file = new Blob([content], { type: contentType });
            a.href = URL.createObjectURL(file);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
        };

        function render() {
            var cnr = 0;
            var txt = '<br><br>';
            for (var key in localStorage) {
                if (key.substring(0, 1) == "|") {
                    cnr++;
                    key = key.substring(1);
                    txt += '<span title="delete" class="del" onclick="del(\'' + key + '\');">X</span> <div id="' + key + '" onclick="play(\'' + key + '\',\'' + cnr + '\');">' + cnr + '. ' + atob(key) + '</div>';
                }
            }
            document.getElementById("sts").innerHTML = txt;
        }

        function add() {
            var sn = prompt("Please enter your station's name:", "");
            var su = prompt("Please enter your stream url:", "https://");
            if (sn && su) {
                localStorage.setItem('|' + btoa(sn), btoa(su));
                render();
                logs('Station "' + sn + '" added');
            } else {
                logs('Station addition canceled');
            }
        }

        function del(id) {
            id = atob(id);
            if (confirm("Delete " + id + "?")) {
                localStorage.removeItem("|" + btoa(id));
                render();
                logs('Station "' + id + '" deleted');
            } else {
                logs('Deletion canceled');
            }
        }

        function getjson() {
            if (localStorage.length > 0) {
                var txt = '{ ';
                for (var key in localStorage) {
                    if (key.substring(0, 1) == "|") {
                        key = key.substring(1);
                        txt += '"' + atob(key).replace(/[\W_]+/gi, " ") + '":"' + atob(localStorage.getItem('|' + key)).replace(/[\"\'\<\>]/gi, '') + '", ';
                    }
                }
                txt = txt.substring(0, (txt.length - 2));
                txt += ' }';
                downloadToFile(txt, 'stations.json', 'application/json');
                logs('Json file created');
            } else {
                logs('No stations to create json file. Add some stations first');
            }
        }

        function putjson(e, o) {
            fr = new FileReader();
            fr.readAsText(o.files[0]);
            fr.onload = function(e) {
                var m = JSON.parse(e.target.result);
                if (confirm("YOUR STATIONS WILL BE REPLACED!")) {
                    localStorage.clear();
                    for (var k in m) {
                        localStorage.setItem('|' + btoa(k), btoa(m[k]));
                    }
                    render();
                    logs('Stations loaded from your json file');
                }
            }
        }

        var timerId, url, watch1, watch2, op, logger, clog = 0, st2, myAudio;

        function logs(m) {
            if (!logger) return;
            if (clog > 1024) {
                clog = 0;
                logger.innerHTML = '';
            }
            clog++;
            logger.innerHTML += clog + '. ' + m + '<br>';
        }

        function updateInstallButton() {
            const btn = document.getElementById('installButton');
            if (!btn) return;

            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                               (window.navigator.standalone === true);

            btn.style.display = isStandalone ? 'none' : 'inline-block';
        }

        window.onload = function() {
            logger = document.getElementById('logs');
            st2 = document.getElementById('status');
            myAudio = document.getElementById("player");

            logs('Page is fully loaded');
            render();

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(() => logs('Service Worker registered'))
                    .catch(err => logs('Service Worker failed'));
            }

            // Multiple checks to handle Windows Chrome timing issues
            updateInstallButton();
            setTimeout(updateInstallButton, 300);
            setTimeout(updateInstallButton, 800);
